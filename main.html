<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Drag Drop Images</title>


    <style>
        #div1 { background-image: url("https://picsum.photos/id/237/200/300"); height: 300px; width: 200px; margin: 20px; } #div2 { background-image: url("https://picsum.photos/seed/picsum/200/300"); height: 300px; width: 200px; margin: 20px; } #div3 { background-image: url("https://picsum.photos/200/300?grayscale"); height: 300px; width: 200px; margin: 20px; } #div4 { background-image: url("https://picsum.photos/200/300/"); height: 300px; width: 200px; margin: 20px; } #div5 { background-image: url("https://picsum.photos/200/300.jpg"); height: 300px; width: 200px; margin: 20px; } #div6 { background-image: url("https://picsum.photos/id/102/200/300"); height: 300px; width: 200px; margin: 20px; } div.container { border: 5px solid #555; } .flex { display: flex; justify-content: center; align-items: center; } .selected { border: 5px solid rgb(0, 195, 255); } p { text-align: center; } button { margin: 20px; }
    </style>

</head>



<body>


    <h1 style="text-align:center">
        Arrange Images by Drag and Drop
    </h1>



    <div class="flex" id="parent">



        <div id="div1" class="image" draggable="true">
            <img src="https://picsum.photos/id/237/200/300">
        </div>



        <div id="div2" class="image" draggable="true">
            <img src="https://picsum.photos/seed/picsum/200/300">
        </div>



        <div id="div3" class="image" draggable="true">
            <img src="https://picsum.photos/200/300?grayscale">
        </div>



        <div id="div4" class="image" draggable="true">
            <img src="https://picsum.photos/200/300/">
        </div>



        <div id="div5" class="image" draggable="true">
            <img src="https://picsum.photos/200/300.jpg">
        </div>



        <div id="div6" class="image" draggable="true">
            <img src="https://picsum.photos/id/102/200/300">
        </div>



    </div>





    <script>


        let dragged = null;

let images = document.querySelectorAll(".image");


for(let image of images){


    image.addEventListener("dragstart",(e)=>{

        dragged = e.currentTarget;

        e.currentTarget.classList.add("selected");

    });



    image.addEventListener("dragend",(e)=>{

        e.currentTarget.classList.remove("selected");

    });



    image.addEventListener("dragover",(e)=>{

        e.preventDefault();

    });



    image.addEventListener("drop",(e)=>{

        e.preventDefault();


        let target = e.currentTarget;



        if(target === dragged){
            return;
        }



        let parent = target.parentNode;



        let temp = document.createElement("div");


        parent.insertBefore(temp,target);



        parent.insertBefore(target,dragged);



        parent.insertBefore(dragged,temp);



        parent.removeChild(temp);


    });


}

    </script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Better Instagram</title>


<style>

.flex{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
}


.image{

    margin:20px;
    cursor:grab;

}


img{

    width:200px;
    height:300px;
    object-fit:cover;

}


.selected{

    border:5px solid rgb(0,195,255);

}


</style>


</head>


<body>


<h1 style="text-align:center">
Arrange Images by Drag and Drop
</h1>



<div class="flex" id="parent">


<div draggable="true" id="drag1" class="image">

<img id="div1"
src="https://picsum.photos/id/237/200/300">

</div>




<div draggable="true" id="drag2" class="image">

<img id="div2"
src="https://picsum.photos/seed/picsum/200/300">

</div>





<div draggable="true" id="drag3" class="image">

<img id="div3"
src="https://picsum.photos/200/300?grayscale">

</div>





<div draggable="true" id="drag4" class="image">

<img id="div4"
src="https://picsum.photos/200/300/">

</div>





<div draggable="true" id="drag5" class="image">

<img id="div5"
src="https://picsum.photos/200/300.jpg">

</div>





<div draggable="true" id="drag6" class="image">

<img id="div6"
src="https://picsum.photos/id/102/200/300">

</div>



</div>





<script>


let dragged = null;


let images = document.querySelectorAll(".image");



for(let image of images){


    image.addEventListener("dragstart",(e)=>{


        dragged = e.currentTarget;

        dragged.classList.add("selected");


    });



    image.addEventListener("dragend",()=>{


        dragged.classList.remove("selected");


    });




    image.addEventListener("dragover",(e)=>{


        e.preventDefault();


    });





    image.addEventListener("drop",(e)=>{


        e.preventDefault();


        let target = e.currentTarget;



        if(target === dragged)
            return;



        let parent = target.parentNode;



        parent.insertBefore(
            dragged,
            target
        );



    });



}



</script>



</body>

</html>

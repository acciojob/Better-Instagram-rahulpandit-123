<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Drag Drop Images</title>

<style>

#div1 { 
background-image:url("https://picsum.photos/id/237/200/300");
}

#div2 { 
background-image:url("https://picsum.photos/seed/picsum/200/300");
}

#div3 { 
background-image:url("https://picsum.photos/200/300?grayscale");
}

#div4 { 
background-image:url("https://picsum.photos/200/300/");
}

#div5 { 
background-image:url("https://picsum.photos/200/300.jpg");
}

#div6 { 
background-image:url("https://picsum.photos/id/102/200/300");
}


.image{

height:300px;
width:200px;
margin:20px;

background-size:cover;
background-position:center;

}



.flex{

display:flex;
justify-content:center;
align-items:center;

}



.selected{

border:5px solid rgb(0,195,255);

}


img{

width:100%;
height:100%;
opacity:0;

}

</style>

</head>


<body>


<h1 style="text-align:center">
Arrange Images by Drag and Drop
</h1>


<div class="flex" id="parent">



<div id="drag1" class="image" draggable="true">

<div id="div1">
<img src="https://picsum.photos/id/237/200/300">
</div>

</div>




<div id="drag2" class="image" draggable="true">

<div id="div2">
<img src="https://picsum.photos/seed/picsum/200/300">
</div>

</div>




<div id="drag3" class="image" draggable="true">

<div id="div3">
<img src="https://picsum.photos/200/300?grayscale">
</div>

</div>




<div id="drag4" class="image" draggable="true">

<div id="div4">
<img src="https://picsum.photos/200/300/">
</div>

</div>




<div id="drag5" class="image" draggable="true">

<div id="div5">
<img src="https://picsum.photos/200/300.jpg">
</div>

</div>




<div id="drag6" class="image" draggable="true">

<div id="div6">
<img src="https://picsum.photos/id/102/200/300">
</div>

</div>



</div>




<script>


let dragged = null;


let boxes = document.querySelectorAll(".image");



boxes.forEach(box=>{


box.addEventListener("dragstart",(e)=>{


dragged = e.currentTarget;


e.currentTarget.classList.add("selected");


});




box.addEventListener("dragend",(e)=>{


e.currentTarget.classList.remove("selected");


});





box.addEventListener("dragover",(e)=>{


e.preventDefault();


});






box.addEventListener("drop",(e)=>{


e.preventDefault();



let target = e.currentTarget;



if(target===dragged)
return;




let parent = target.parentNode;



let temp = document.createElement("div");


parent.insertBefore(temp,target);



parent.insertBefore(dragged,target);



parent.insertBefore(target,temp);



parent.removeChild(temp);



});



});



</script>


</body>

</html>
